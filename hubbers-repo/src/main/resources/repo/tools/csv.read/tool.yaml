tool:
  name: csv.read
  version: 1.0.0
  description: Read rows from a CSV file into items array

type: csv.read

# Form displayed BEFORE tool execution
forms:
  before:
    title: "CSV Read Configuration"
    description: "Select the CSV file to read and process"
    fields:
      - name: file_path
        type: text
        label: "CSV File Path"
        placeholder: "./datasets/rss-sentiment.csv"
        required: true
        defaultValue: "./datasets/rss-sentiment.csv"

config:
  default_file_path: ./datasets/rss-sentiment.csv

input:
  schema:
    type: object
    properties:
      file_path:
        type: string
        required: false

output:
  schema:
    type: object
    properties:
      items:
        type: array
        required: true
      rows:
        type: number
        required: true

examples:
  - name: read-rss-sentiment
    description: Load sentiment rows from CSV
    input:
      file_path: ./datasets/rss-sentiment.csv
    output:
      rows: 2
      items:
        - title: AI stocks rally
          source: Example News
          sentiment: positive
          sentiment_score: "0.81"
