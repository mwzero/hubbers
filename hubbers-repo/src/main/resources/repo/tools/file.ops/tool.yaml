tool:
  name: file.ops
  version: 1.0.0
  description: Perform file system operations (read, write, copy, move, delete, list, mkdir, exists, info)

type: file.ops

# Form displayed BEFORE tool execution
forms:
  before:
    title: "File Operations Configuration"
    description: "Configure file system operation parameters"
    fields:
      - name: operation
        type: select
        label: "Operation Type"
        required: true
        defaultValue: "read"
        options:
          - label: "Read File"
            value: "read"
          - label: "Write File"
            value: "write"
          - label: "Copy File"
            value: "copy"
          - label: "Move/Rename File"
            value: "move"
          - label: "Delete File"
            value: "delete"
          - label: "List Directory"
            value: "list"
          - label: "Create Directory"
            value: "mkdir"
          - label: "Check Exists"
            value: "exists"
          - label: "File Info"
            value: "info"
      
      - name: path
        type: text
        label: "File/Directory Path"
        placeholder: "./datasets/file.txt"
        required: true
      
      - name: content
        type: textarea
        label: "Content to Write"
        placeholder: "Enter file content..."
        required: false
      
      - name: destination
        type: text
        label: "Destination Path"
        placeholder: "./backup/file.txt"
        required: false
      
      - name: pattern
        type: text
        label: "File Pattern/Filter"
        placeholder: "*.csv"
        required: false
      
      - name: recursive
        type: checkbox
        label: "Recursive operation"
        defaultValue: false

config:
  default_encoding: UTF-8

input:
  schema:
    type: object
    properties:
      operation:
        type: string
        required: true
      path:
        type: string
        required: true
      content:
        type: string
        required: false
      destination:
        type: string
        required: false
      pattern:
        type: string
        required: false
      recursive:
        type: boolean
        required: false

output:
  schema:
    type: object
    properties:
      success:
        type: boolean
        required: true
      message:
        type: string
        required: false
      content:
        type: string
        required: false
      items:
        type: array
        required: false
      info:
        type: object
        required: false

examples:
  - name: read-file
    description: Read content from a text file
    input:
      operation: read
      path: ./datasets/cities_coordinates.csv
    output:
      success: true
      content: "city,latitude,longitude\nRome,41.9028,12.4964"

  - name: write-file
    description: Write content to a file
    input:
      operation: write
      path: ./output/result.txt
      content: "Hello World"
    output:
      success: true
      message: "File written successfully"

  - name: list-directory
    description: List files in a directory
    input:
      operation: list
      path: ./datasets
    output:
      success: true
      items:
        - cities_coordinates.csv
        - rss-sentiment.csv

  - name: copy-file
    description: Copy a file to another location
    input:
      operation: copy
      path: ./datasets/cities_coordinates.csv
      destination: ./backup/cities_coordinates.csv
    output:
      success: true
      message: "File copied successfully"

  - name: file-info
    description: Get information about a file
    input:
      operation: info
      path: ./datasets/cities_coordinates.csv
    output:
      success: true
      info:
        size: 1024
        lastModified: "2026-03-15T10:30:00Z"
        isDirectory: false
        isFile: true
