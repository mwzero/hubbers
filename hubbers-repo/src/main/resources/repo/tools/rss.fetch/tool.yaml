tool:
  name: rss.fetch
  version: 1.0.0
  description: Fetch and normalize RSS/Atom feed items

type: rss

config:
  default_limit: 20

input:
  schema:
    type: object
    properties:
      feeds:
        type: array
        description: "Array of RSS/Atom feed URLs to fetch. Examples: ['https://www.ansa.it/sito/notizie/topnews/topnews_rss.xml'] for ANSA.it, ['https://example.com/rss.xml'] for generic sites"
        items:
          type: string
        required: true
      limit:
        type: number
        description: "Maximum number of items to return per feed (default: 20)"
        required: false

output:
  schema:
    type: object
    properties:
      items:
        type: array
        required: true

examples:
  - name: fetch-ansa-rss
    description: Fetch latest news from ANSA.it RSS feed
    input:
      feeds:
        - https://www.ansa.it/sito/notizie/topnews/topnews_rss.xml
      limit: 10
    output:
      items:
        - source: ANSA.it
          feed_url: https://www.ansa.it/sito/notizie/topnews/topnews_rss.xml
          title: Latest news title
          link: https://www.ansa.it/sito/notizie/...
          published_at: "2026-04-15T10:00:00Z"
  
  - name: fetch-two-feeds
    description: Recupero ultimi item da due feed RSS
    input:
      feeds:
        - https://example.com/rss.xml
        - https://another.example.com/feed
      limit: 2
    output:
      items:
        - source: Example News
          feed_url: https://example.com/rss.xml
          title: AI adoption grows in Europe
          link: https://example.com/articles/ai-europe
          published_at: "2026-03-29T07:00:00Z"
          summary: New report highlights rapid enterprise adoption.
          content: Companies are investing more in AI training and tooling.
