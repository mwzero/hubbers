tool:
  name: vector.lucene.search
  version: 1.0.0
  description: Search embedded Lucene vector index and enrich items with retrieved context

type: vector.lucene.search

# Form displayed BEFORE tool execution
forms:
  before:
    title: "Vector Search Configuration"
    description: "Configure vector similarity search parameters"
    fields:
      - name: index_path
        type: text
        label: "Vector Index Path"
        placeholder: "./datasets/lucene/rss-sentiment-index"
        required: false
        defaultValue: "./datasets/lucene/rss-sentiment-index"
      
      - name: top_k
        type: number
        label: "Number of Results"
        min: 1
        max: 20
        defaultValue: 3
        required: false
      
      - name: similarity_threshold
        type: slider
        label: "Minimum Similarity Score"
        min: 0
        max: 1
        step: 0.05
        defaultValue: 0.7
        required: false

config:
  index_path: ./datasets/lucene/rss-sentiment-index
  top_k: 3

input:
  schema:
    type: object
    properties:
      items:
        type: array
        required: true
      index_path:
        type: string
        required: false
      top_k:
        type: number
        required: false

output:
  schema:
    type: object
    properties:
      items:
        type: array
        required: true

examples:
  - name: enrich-with-historical-context
    description: Retrieve nearest historical records for each incoming RSS item
    input:
      index_path: ./datasets/lucene/rss-sentiment-index
      top_k: 2
      items:
        - title: Central bank hints at rate cuts
          summary: Markets jump on expected policy shift
          content: Investors increased risk appetite.
          source: Example News
          link: https://example.com/articles/rate-cuts
    output:
      items:
        - title: Central bank hints at rate cuts
          summary: Markets jump on expected policy shift
          content: Investors increased risk appetite.
          source: Example News
          link: https://example.com/articles/rate-cuts
          retrieved_context:
            - id: historical-1
              score: 0.89
              title: Previous rate cut expectations
