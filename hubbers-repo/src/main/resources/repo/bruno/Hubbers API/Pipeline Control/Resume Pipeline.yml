info:
  name: Resume Pipeline
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/pipeline/{{executionId}}/resume"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "formField1": "value1"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Resume a paused pipeline execution by submitting form data.
