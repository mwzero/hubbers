info:
  name: MCP - Call Tool
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/mcp"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "jsonrpc": "2.0",
        "id": 3,
        "method": "tools/call",
        "params": {
          "name": "tool-name",
          "arguments": {
            "key": "value"
          }
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Call an MCP tool by name with arguments.
