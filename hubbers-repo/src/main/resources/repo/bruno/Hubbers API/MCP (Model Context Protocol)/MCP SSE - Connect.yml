http:
  method: GET
  url: "{{baseUrl}}/mcp/sse"
  headers:
    - name: Accept
      value: text/event-stream
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Establish SSE connection for MCP (backward-compatible transport). Returns endpoint URL for sending messages.
