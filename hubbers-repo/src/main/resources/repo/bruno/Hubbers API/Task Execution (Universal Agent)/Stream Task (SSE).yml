info:
  name: Stream Task (SSE)
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/api/task/stream"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: text/event-stream
  body:
    type: json
    data: |-
      {
        "request": "Analyze this data",
        "context": null,
        "agentName": null,
        "conversationId": null,
        "model": null
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Stream task execution events via Server-Sent Events (SSE) for real-time chat rendering.
