info:
  name: Run Pipeline
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/api/run/pipelines/:name"
  headers:
    - name: Content-Type
      value: application/json
  params:
    - name: name
      value: example-pipeline
      type: path
      description: Name of the pipeline to execute
  body:
    type: json
    data: |-
      {
        "input": "pipeline input data"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "var jsonData = res.getBody();\r

        if (jsonData.executionId) {\r

        \    bru.setVar('executionId', jsonData.executionId);\r

        }"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Execute a pipeline synchronously.
