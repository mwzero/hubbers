info:
  name: Health Check
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/api/health"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 OK
    request:
      url: ""
      method: GET
    response:
      statusText: "200"
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: '{"status": "ok"}'

docs: Returns server health status. No authentication required.
