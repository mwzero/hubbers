info:
  name: Get Step Log
  type: http
  seq: 7

http:
  method: GET
  url: "{{baseUrl}}/api/executions/{{executionId}}/steps/:stepName/log"
  params:
    - name: stepName
      value: step-1
      type: path
      description: Name of the pipeline step
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: Get log for a specific pipeline step.
