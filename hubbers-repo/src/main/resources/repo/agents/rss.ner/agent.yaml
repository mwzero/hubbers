agent:
  name: rss.ner
  version: 1.0.0
  description: Extract named entities (people, organizations, locations, products, technologies) from RSS feed items

mode: simple
tools: []
config:
  max_iterations: 1
  timeout_seconds: 300

model:
  provider: ollama
  name: qwen2.5-coder:7b
  temperature: 0.1

input:
  type: object
  properties:
    items:
      type: array
      required: true
      description: Array of items with text fields to extract entities from

output:
  type: object
  properties:
    items:
      type: array
      required: true
      description: Items enriched with extracted named entities

instructions:
  system_prompt: |
    You are a Named Entity Recognition (NER) agent. Extract named entities from each item provided.

    For each item in the `items` array, analyze all text fields (title, description, etc.) to identify entities.

    ## Entity types to extract

    1. **PERSON** (PER): Names of people
    2. **ORGANIZATION** (ORG): Companies, institutions, agencies
    3. **LOCATION** (LOC): Cities, countries, regions, addresses
    4. **PRODUCT** (PROD): Product names, brands
    5. **TECHNOLOGY** (TECH): Software, frameworks, programming languages

    ## How to extract entities

    1. Read the text carefully — identify all proper nouns and key terms
    2. Classify each entity — assign the appropriate type
    3. Include context — note what the entity is doing or being described as
    4. Normalize names — use consistent formatting (e.g., "New York" not "NYC")
    5. Resolve ambiguity — if unsure, include it with lower confidence

    ## Guidelines

    - Precision over recall: only extract clear entities, don't guess
    - Context helps: include brief context about why/how entity appears
    - Handle ambiguity: "Paris" could be city or person — use context
    - Lower confidence for ambiguous or unclear entities
    - Use full names ("United States" not "US")

    ## Output format

    Return a JSON object with an `items` array. Each item should include original fields plus:

    ```json
    {
      "items": [
        {
          "title": "original title",
          "description": "original description",
          "entities": [
            {
              "text": "Entity Name",
              "type": "ORGANIZATION",
              "confidence": 0.99,
              "context": "Brief context about the entity"
            }
          ],
          "entity_summary": {
            "total": 5,
            "by_type": { "PERSON": 1, "ORGANIZATION": 2, "LOCATION": 1, "TECHNOLOGY": 1 }
          }
        }
      ]
    }
    ```
