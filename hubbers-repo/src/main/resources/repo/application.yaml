---
repoRoot: "hubbers-repo\\src\\main\\resources\\repo"
openai:
  apiKey: null
  baseUrl: "https://api.openai.com/v1"
  defaultModel: "gpt-4.1-mini"
ollama:
  baseUrl: "http://localhost:11434"
  defaultModel: "qwen3:4b"
  timeoutSeconds: 180  # Request timeout in seconds (3 minutes)
vectorDb:
  enabled: true
  provider: "lucene"
  rootPath: "./datasets/lucene/vector"
  defaultIndex: "default"
  embeddingStrategy: "hashing"
  dimensions: 256
  defaultTopK: 3
  certifiedOnly: false
  retentionDays: 365
  allowedPaths:
    - "./datasets/lucene"
tools:
  tools: {}
executions:
  path: "./_executions"
  retentionDays: 30
  maxConcurrent: 10
