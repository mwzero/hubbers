tool:
  name: vector.lucene.upsert
  version: 1.0.0
  description: Upsert items into embedded Lucene vector index

type: vector.lucene.upsert

# Form displayed BEFORE tool execution
forms:
  before:
    title: "Vector Upsert Configuration"
    description: "Configure vector index upsert parameters"
    fields:
      - name: index_path
        type: text
        label: "Vector Index Path"
        placeholder: "./datasets/lucene/rss-sentiment-index"
        required: false
        defaultValue: "./datasets/lucene/rss-sentiment-index"
      
      - name: batch_size
        type: number
        label: "Batch Size"
        min: 1
        max: 1000
        defaultValue: 100
        required: false
      
      - name: create_if_missing
        type: checkbox
        label: "Create index if it doesn't exist"
        defaultValue: true
      
      - name: optimize_after
        type: checkbox
        label: "Optimize index after upsert"
        defaultValue: false

config:
  index_path: ./datasets/lucene/rss-sentiment-index

input:
  schema:
    type: object
    properties:
      items:
        type: array
        required: true
      index_path:
        type: string
        required: false

output:
  schema:
    type: object
    properties:
      index_path:
        type: string
        required: true
      upserted:
        type: number
        required: true

examples:
  - name: upsert-from-csv
    description: Load historical sentiment records into Lucene index
    input:
      index_path: ./datasets/lucene/rss-sentiment-index
      items:
        - title: AI stocks rally
          summary: Market optimism after strong earnings
          sentiment: positive
          source: Example News
    output:
      index_path: ./datasets/lucene/rss-sentiment-index
      upserted: 1
