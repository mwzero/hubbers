tool:
  name: pdf.extract
  version: 1.0.0
  description: Extract text from PDF

type: docker

config:
  image: myorg/pdf-extract:1.0.0

input:
  schema:
    type: object
    properties:
      file_path:
        type: string
        required: true

output:
  schema:
    type: object
    properties:
      text:
        type: string
        required: true

examples:
  - name: extract-contract
    description: Estrazione testo da un PDF locale
    input:
      file_path: /tmp/sample-contract.pdf
    output:
      text: >
        Contratto di servizio tra Alpha Srl e Beta Spa. Durata 12 mesi.
