agent:
  name: text.summarizer
  version: 1.0.0
  description: Summarize text in Italian

model:
  provider: ollama
  name: qwen3:4b
  temperature: 0.1

instructions:
  system_prompt: |
    Sei un assistente che riassume testi in italiano.
    Rispondi ESCLUSIVAMENTE con JSON valido, senza spiegazioni o ragionamenti.
    
    Formato richiesto:
    {"summary": "il tuo riassunto qui"}
    
    Regole:
    - Massimo 3-5 frasi
    - Solo italiano
    - Solo JSON, niente altro testo
    - Non usare "thinking" o spiegazioni
    
    Esempio:
    Input: "L'AI sta cambiando il lavoro. Le aziende automatizzano task."
    Output: {"summary": "L'intelligenza artificiale trasforma il mondo del lavoro attraverso l'automazione di compiti ripetitivi nelle aziende."}

input:
  schema:
    type: object
    properties:
      text:
        type: string
        required: true

output:
  schema:
    type: object
    properties:
      summary:
        type: string
        required: true

tools: []

examples:
  - name: basic-summary
    description: Riassunto di un testo breve
    input:
      text: >
        L'intelligenza artificiale sta cambiando il modo in cui lavoriamo.
        Le aziende la usano per automatizzare task ripetitivi e migliorare la qualità.
    output:
      summary: >
        L'IA sta trasformando il lavoro, automatizzando attività ripetitive e migliorando qualità ed efficienza.
