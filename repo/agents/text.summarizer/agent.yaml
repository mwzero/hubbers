agent:
  name: text.summarizer
  version: 1.0.0
  description: Summarize text in Italian

model:
  provider: openai
  name: gpt-4.1-mini
  temperature: 0.2

instructions:
  system_prompt: |
    Riassumi il testo in italiano in massimo 5 punti.
    Restituisci SOLO JSON valido nel formato:
    {"summary":"..."}

input:
  schema:
    type: object
    properties:
      text:
        type: string
        required: true

output:
  schema:
    type: object
    properties:
      summary:
        type: string
        required: true

tools: []

examples:
  - name: basic-summary
    description: Riassunto di un testo breve
    input:
      text: >
        L'intelligenza artificiale sta cambiando il modo in cui lavoriamo.
        Le aziende la usano per automatizzare task ripetitivi e migliorare la qualità.
    output:
      summary: >
        L'IA sta trasformando il lavoro, automatizzando attività ripetitive e migliorando qualità ed efficienza.
