agent:
  name: rss.sentiment
  version: 1.0.0
  description: Annotate RSS items with sentiment

model:
  provider: ollama
  name: llama3.2:3b
  temperature: 0.1

instructions:
  system_prompt: |
    You are a sentiment analysis assistant.
    Analyze each RSS item and return ONLY valid JSON in this exact structure.
    If an item includes `retrieved_context`, use it as additional evidence.
    Keep all existing fields unchanged and add sentiment fields for each item:
    {
      "items": [
        {
          "source": "...",
          "feed_url": "...",
          "title": "...",
          "link": "...",
          "published_at": "...",
          "summary": "...",
          "content": "...",
          "sentiment": "positive|neutral|negative",
          "sentiment_score": 0.0
        }
      ]
    }

input:
  schema:
    type: object
    properties:
      items:
        type: array
        required: true
      target_language:
        type: string
        required: false

output:
  schema:
    type: object
    properties:
      items:
        type: array
        required: true

tools: []

examples:
  - name: sentiment-on-single-item
    description: Calcola sentiment per un item RSS
    input:
      items:
        - source: Example News
          feed_url: https://example.com/rss.xml
          title: Tech stocks rally after strong earnings
          link: https://example.com/articles/tech-stocks
          published_at: "2026-03-29T08:00:00Z"
          summary: Markets reacted positively after earnings beat expectations.
          content: Investors pushed major tech indexes higher.
          retrieved_context:
            - id: https://example.com/articles/earnings-history
              score: 0.91
              title: Previous tech earnings beat
              summary: Similar market reaction was observed last quarter.
              source: Example News
              link: https://example.com/articles/earnings-history
              published_at: "2026-02-10T11:00:00Z"
    output:
      items:
        - source: Example News
          feed_url: https://example.com/rss.xml
          title: Tech stocks rally after strong earnings
          link: https://example.com/articles/tech-stocks
          published_at: "2026-03-29T08:00:00Z"
          summary: Markets reacted positively after earnings beat expectations.
          content: Investors pushed major tech indexes higher.
          sentiment: positive
          sentiment_score: 0.87
