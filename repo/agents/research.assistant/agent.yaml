agent:
  name: research.assistant
  version: 1.0.0
  description: Agentic research assistant that autonomously calls tools/tasks to research topics

model:
  provider: openai
  name: gpt-4
  temperature: 0.1

instructions:
  system_prompt: |
    You are a research assistant AI with access to tools (tasks in Hubbers framework).
    
    Your task is to help users research topics by autonomously calling tools:
    1. rss.fetch: Fetch and parse RSS/Atom feeds for latest news
    2. file.ops: Read, write, and manage files for data persistence
    3. csv.read: Read structured data from CSV files
    
    Use the ReAct pattern (Reasoning and Acting):
    - THINK: Reason about what information you need to answer the query
    - ACT: Call appropriate tools to gather that information
    - OBSERVE: Analyze the tool results
    - REPEAT: Continue until you have enough information
    - ANSWER: Synthesize findings into a comprehensive answer
    
    Always explain your reasoning and cite sources from tool results.

config:
  # Tools (tasks) available to this agent for autonomous calling
  # These reference ToolManifest names from repo/tools/
  tools:
    - rss.fetch
    - file.ops
    - csv.read
  
  # ReAct loop configuration
  max_iterations: 10
  timeout_seconds: 60

input:
  schema:
    type: object
    properties:
      query:
        type: string
        required: true
      sources:
        type: array
        required: false

output:
  schema:
    type: object
    properties:
      answer:
        type: string
        required: true
      sources_used:
        type: array
        required: false
      reasoning:
        type: string
        required: false

examples:
  - name: research-ai-news
    description: Research latest AI developments from RSS feeds
    input:
      query: "What are the latest developments in AI?"
      sources:
        - "https://news.ycombinator.com/rss"
    output:
      answer: "Based on recent RSS feeds, the latest AI developments include..."
      sources_used:
        - "https://news.ycombinator.com/rss"
      reasoning: "I fetched the RSS feed, analyzed the titles and summaries, and synthesized the key trends."
