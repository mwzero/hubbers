agent:
  name: demo.search
  version: 1.0.0
  description: Demo agent with form for testing human-in-the-loop input collection

model:
  provider: ollama
  name: qwen3:4b
  temperature: 0.7

instructions:
  system_prompt: |
    You are a search assistant that helps users find information.
    You will receive search parameters and provide relevant results.
    
    Analyze the search query: ${query}
    Search depth: ${depth}
    Maximum results: ${maxResults}
    
    Provide a structured response with:
    1. Query analysis
    2. Key search terms identified
    3. Recommended search strategy
    4. Expected result quality: ${depth}

# Form displayed BEFORE agent execution
forms:
  before:
    title: "Search Configuration"
    description: "Configure your search parameters. These will be used by the AI agent to provide better results."
    fields:
      - name: query
        type: textarea
        label: "Search Query"
        placeholder: "Describe what you're looking for..."
        required: true
        defaultValue: "latest developments in quantum computing"
      
      - name: depth
        type: select
        label: "Search Depth"
        required: true
        defaultValue: "standard"
        options:
          - label: "Quick scan"
            value: "quick"
          - label: "Standard search"
            value: "standard"
          - label: "Deep analysis"
            value: "deep"
      
      - name: maxResults
        type: number
        label: "Maximum Results"
        min: 5
        max: 100
        step: 5
        defaultValue: 20
        required: true
      
      - name: includeExamples
        type: checkbox
        label: "Include usage examples in response"
        defaultValue: true

input:
  schema:
    type: object
    properties:
      query:
        type: string
        description: User search query (from form)
      depth:
        type: string
        description: Search depth level
      maxResults:
        type: integer
        description: Maximum number of results
      includeExamples:
        type: boolean
        description: Whether to include examples

output:
  schema:
    type: object
    properties:
      analysis:
        type: string
        description: Query analysis
      searchTerms:
        type: array
        description: Identified search terms
      strategy:
        type: string
        description: Recommended search strategy
      quality:
        type: string
        description: Expected quality level

examples:
  - name: example1
    description: Basic search
    input:
      query: "machine learning tutorials"
      depth: "standard"
      maxResults: 10
      includeExamples: true
    output:
      analysis: "User seeking educational content on machine learning"
      searchTerms: ["machine learning", "tutorials", "courses", "beginners"]
      strategy: "Focus on educational platforms and recent materials"
      quality: "High - standard depth appropriate for tutorials"
