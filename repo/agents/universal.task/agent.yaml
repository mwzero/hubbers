agent:
  name: universal.task
  version: 1.0.0
  description: Universal task agent that can execute any request using available tools autonomously

model:
  provider: ollama
  name: qwen2.5-coder:7b
  temperature: 0.1

instructions:
  system_prompt: |
    You are a universal task execution agent with access to a comprehensive set of tools.
    
    Your mission is to understand user requests in natural language and accomplish them by autonomously calling the appropriate tools.
    
    Available approach - ReAct Pattern:
    1. THINK: Reason about what needs to be done and which tools can help
    2. ACT: Call the appropriate tool(s) with correct parameters
    3. OBSERVE: Analyze the tool results
    4. REPEAT: Continue the cycle until the task is complete
    5. ANSWER: Provide a clear, structured response to the user
    
    Guidelines:
    - Always explain your reasoning (what you're doing and why)
    - Call tools with accurate parameters based on their schemas
    - Handle errors gracefully - if a tool fails, try an alternative approach
    - For web tasks (like checking shopping carts), use browser.pinchtab tool with appropriate actions
    - For data processing, combine multiple tools as needed
    - Format your final output in a clear, structured way (use JSON when appropriate)
    - If a task is impossible or unclear, explain why and ask for clarification
    
    Important:
    - You have access to ALL available tools in the system
    - Tool descriptions and parameters are provided in the function definitions
    - Be methodical: break complex tasks into smaller steps
    - Always validate results before moving to the next step

config:
  # Tools will be injected dynamically at runtime with ALL available tools
  tools: []
  
  max_iterations: 15
  timeout_seconds: 120

input:
  schema:
    type: object
    properties:
      request:
        type: string
        required: true
        description: Natural language request from user
      context:
        type: object
        required: false
        description: Optional context data for the task

output:
  schema:
    type: object
    properties:
      result:
        type: object
        required: true
        description: The result of the task execution (can be any structure)
      tools_used:
        type: array
        required: true
        description: List of tool names that were called
      reasoning:
        type: string
        required: true
        description: Explanation of the approach taken and why

examples:
  - name: fetch-rss
    description: Simple RSS fetching task
    input:
      request: "Fetch RSS from TechCrunch"
    output:
      result:
        items_count: 25
        items:
          - title: "AI Breakthrough..."
            link: "https://..."
      tools_used:
        - "rss.fetch"
      reasoning: "I called rss.fetch with TechCrunch's RSS feed URL to retrieve the latest articles."
  
  - name: amazon-cart
    description: Complex browser automation task
    input:
      request: "Check my Amazon shopping cart"
    output:
      result:
        cart_items:
          - name: "Wireless Mouse"
            price: "$29.99"
          - name: "USB Cable"
            price: "$12.99"
        total_items: 2
      tools_used:
        - "browser.pinchtab"
      reasoning: "I used browser automation to navigate to Amazon cart, verified authentication, extracted cart items HTML, and parsed the product information."